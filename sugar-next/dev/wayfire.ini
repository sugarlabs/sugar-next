# Minimal Wayfire session for developing Sugar Next in a nested window.
#
# Wayfire is a wlroots compositor, so unlike GNOME/Mutter it *does* offer
# zwlr_foreign_toplevel_manager_v1 (via the foreign-toplevel plugin below).
# That is the protocol Sugar Next's TopLevelTracker consumes to learn which
# apps are open AND which one is focused (the `activated` state) — so
# running the shell here exercises the full three-state icon rendering
# (greyscale / color / focused) that the two-state GNOME fallback cannot.
#
# Launched nested inside the current session; see dev/run-wayfire.sh.

[core]
# foreign-toplevel: advertises zwlr_foreign_toplevel_manager_v1 (window
#   open/close/focus events — what Sugar Next tracks).
#   KNOWN ISSUE: Wayfire 0.10.1 (wlroots-0.19.3) advertises this manager
#   at v3 but does not emit the `toplevel` event, so no window is ever
#   reported here — Sugar Next falls back to two-state icons. Verified
#   with wayland-info + a raw pywayland client. Tracking a modern
#   compositor (Hyprland) is a separate exploration.
# autostart: starts Sugar Next as the session shell.
# decoration: gives nested windows a titlebar, like any normal window.
# move/resize/place/window-rules: make launched activities usable.
plugins = autostart foreign-toplevel decoration move resize place window-rules

[decoration]
# Visible titlebar + border so activities look like ordinary windows
# during development.
title_height = 24
border_size = 2

[autostart]
# The dev wrapper exports SUGAR_NEXT_CMD with the exact venv python + module
# invocation, so this file stays independent of local venv paths.
sugar_next = sh -c "$SUGAR_NEXT_CMD"

[place]
mode = center
